<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthropology Notes Reader</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css?v=8">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Anthropology Reader</h2>
                
                <div class="search-container" style="margin-bottom: 12px;">
                    <input type="text" id="search-input" placeholder="Search across all notes..." oninput="handleSearch()" style="width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-primary); font-family: var(--font-ui); font-size: 0.9rem;">
                </div>

                <div class="progress-container">
                    <div class="progress-text">Progress: <span id="progress-count">0</span>/<span id="total-count">0</span></div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-fill"></div>
                    </div>
                </div>

                <div class="pomodoro-widget">
                    <div class="pomo-display" id="pomo-time">25:00</div>
                    <div class="pomo-controls">
                        <button id="pomo-start" onclick="startPomodoro()">Start</button>
                        <button id="pomo-pause" onclick="pausePomodoro()">Pause</button>
                        <button id="pomo-reset" onclick="resetPomodoro()">Reset</button>
                    </div>
                </div>

                <div class="filter-toggles">
                    <button id="btn-paper1" class="filter-btn active" onclick="filterPaper(1)">Paper I</button>
                    <button id="btn-paper2" class="filter-btn active" onclick="filterPaper(2)">Paper II</button>
                </div>
                <div class="unit-filter">
                    <label for="unit-select">Syllabus Unit:</label>
                    <select id="unit-select" onchange="filterUnit()">
                        <option value="ALL">All Units</option>
                    </select>
                </div>
                <div class="utility-controls" style="margin-top: 12px; display: flex; gap: 8px;">
                    <select id="theme-select" onchange="changeTheme()" style="flex: 1; padding: 6px; border-radius: 6px; font-size: 0.8rem; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary);">
                        <option value="light">Light Mode</option>
                        <option value="sepia">Sepia Mode</option>
                        <option value="dark">Dark Mode</option>
                    </select>
                    <button id="btn-flashcards" onclick="toggleFlashcards()" style="flex: 1; background: var(--accent-color); color: white; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer;">Flashcards</button>
                </div>
            </div>
            <div class="sidebar-nav" id="sidebar-nav">
                <!-- Nav items generated by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content-area" id="main-content">
            <button id="toggle-sidebar" class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div id="content-container" class="markdown-body">
                <div class="empty-state">
                    <h1>Select a topic from the sidebar to begin reading.</h1>
                </div>
            </div>
            
            <div id="flashcard-container" class="flashcard-container" style="display: none;">
                <!-- Flashcard UI -->
                <div class="flashcard" onclick="flipCard()">
                    <div class="flashcard-inner">
                        <div class="flashcard-front" id="fc-front">Front</div>
                        <div class="flashcard-back" id="fc-back">Back</div>
                    </div>
                </div>
                <div class="flashcard-controls">
                    <button onclick="prevCard()">Previous</button>
                    <span id="fc-count">0/0</span>
                    <button onclick="nextCard()">Next</button>
                </div>
            </div>

            <!-- Completion Toggle (Injected dynamically per note, but we need a container or handle it in JS) -->
            <div id="note-actions" style="display: none; text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <button id="btn-complete" onclick="toggleComplete()" style="padding: 12px 24px; font-size: 1rem; border-radius: 8px; border: 2px solid var(--accent-color); background: transparent; color: var(--accent-color); cursor: pointer; font-weight: 600;">Mark as Completed ✅</button>
            </div>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="script.js?v=8"></script>
</body>
</html>
