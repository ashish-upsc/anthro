name: Daily Anthropology Study Generator

on:
  schedule:
    # Run 3 times a day: 8:00 AM, 2:00 PM, and 8:00 PM Indian Standard Time (IST)
    # IST is UTC + 5:30.
    # 8:00 AM IST = 2:30 AM UTC
    # 2:00 PM IST = 8:30 AM UTC
    # 8:00 PM IST = 2:30 PM UTC
    - cron: '30 2,8,14 * * *'
  workflow_dispatch:
    inputs:
      specific_unit:
        description: 'Specific Unit to study (e.g., "Unit 1.6" or leave empty for next sequential incomplete unit)'
        required: false
        default: ''
      custom_prompt:
        description: 'Custom search prompt/instructions (e.g., "focus on current tribal case studies")'
        required: false
        default: ''

jobs:
  generate-study-material:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: 'false'
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai requests duckduckgo-search

    - name: Run Study Generator Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python study_generator.py --unit "${{ github.event.inputs.specific_unit }}" --prompt "${{ github.event.inputs.custom_prompt }}"
